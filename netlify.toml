# Netlify build + deploy config for Howe Renovations site.
# Publish from repo root (static HTML, no build step).
# Production branch is `main` — set in Netlify UI when the repo is linked.

[build]
  publish = "."
  command = ""

# Block internal documentation files from being served at the public URL.
# These ship in the deploy bundle because publish = "." but should never
# be reachable to visitors or search crawlers.

[[redirects]]
  from = "/project.md"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/LESSONS.md"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/LESSONS_INDEX.md"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/README.md"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/mike-review-checklist.txt"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/instructions-for-mike.txt"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/Descriptions/*"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/CLAUDE.md"
  to = "/"
  status = 404
  force = true
